<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Debug Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 3px; }
        .error { background: #ffe6e6; color: #d32f2f; }
        .success { background: #e8f5e8; color: #388e3c; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>🔧 Billing System Debug Page</h1>
    
    <div class="section">
        <h2>1. Check Database State</h2>
        <button onclick="checkDatabase()">Check Database</button>
        <div id="database-result" class="result"></div>
    </div>

    <div class="section">
        <h2>2. Check Billing Data</h2>
        <button onclick="checkBillingData()">Check Billing Data</button>
        <div id="billing-result" class="result"></div>
    </div>

    <div class="section">
        <h2>3. Create Test Data</h2>
        <button onclick="createTestData()">Create Test Data</button>
        <div id="test-data-result" class="result"></div>
    </div>

    <div class="section">
        <h2>4. Test Bill Generation</h2>
        <button onclick="testBillGeneration()">Test Bill Generation</button>
        <div id="bill-generation-result" class="result"></div>
    </div>

    <div class="section">
        <h2>5. Check Billing Page</h2>
        <button onclick="checkBillingPage()">Check Billing Page</button>
        <div id="billing-page-result" class="result"></div>
    </div>

    <script>
        async function makeRequest(url, method = 'GET', body = null) {
            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-TOKEN': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || ''
                    }
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                }

                const response = await fetch(url, options);
                const data = await response.json();
                
                return { success: true, data, status: response.status };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        function displayResult(elementId, result, title = '') {
            const element = document.getElementById(elementId);
            if (result.success) {
                element.className = 'result success';
                element.innerHTML = `<strong>${title || 'Success'}:</strong><pre>${JSON.stringify(result.data, null, 2)}</pre>`;
            } else {
                element.className = 'result error';
                element.innerHTML = `<strong>Error:</strong> ${result.error}`;
            }
        }

        async function checkDatabase() {
            const result = await makeRequest('/billing/debug');
            displayResult('database-result', result, 'Database State');
        }

        async function checkBillingData() {
            const result = await makeRequest('/billing/test');
            displayResult('billing-result', result, 'Billing Data Status');
        }

        async function createTestData() {
            const result = await makeRequest('/billing/create-test-data', 'POST');
            displayResult('test-data-result', result, 'Test Data Creation');
        }

        async function testBillGeneration() {
            const result = await makeRequest('/readings/test-create-bill', 'POST');
            displayResult('bill-generation-result', result, 'Bill Generation Test');
        }

        async function checkBillingPage() {
            try {
                const response = await fetch('/billing');
                const html = await response.text();
                
                // Check if the page loads without errors
                if (response.ok) {
                    document.getElementById('billing-page-result').className = 'result success';
                    document.getElementById('billing-page-result').innerHTML = 
                        '<strong>Billing Page Status:</strong> Page loads successfully<br>' +
                        '<strong>Response Length:</strong> ' + html.length + ' characters<br>' +
                        '<strong>Status:</strong> ' + response.status;
                } else {
                    document.getElementById('billing-page-result').className = 'result error';
                    document.getElementById('billing-page-result').innerHTML = 
                        '<strong>Billing Page Error:</strong> ' + response.status + ' ' + response.statusText;
                }
            } catch (error) {
                document.getElementById('billing-page-result').className = 'result error';
                document.getElementById('billing-page-result').innerHTML = 
                    '<strong>Billing Page Error:</strong> ' + error.message;
            }
        }

        // Auto-run database check on page load
        window.onload = function() {
            checkDatabase();
        };
    </script>
</body>
</html>
